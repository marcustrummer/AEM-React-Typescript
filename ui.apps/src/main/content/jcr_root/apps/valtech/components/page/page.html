<!DOCTYPE html>
<html
        data-sly-use.page="com.adobe.aem.spa.project.core.models.Page"
        data-sly-use.pwa="com.adobe.cq.wcm.core.components.models.PWA"
        data-sly-use.pageModel="com.br.valtech.core.models.PageModel"
        lang="${page.language}"
        data-sly-use.head="head.html"
        data-sly-use.footer="footer.html"
        data-sly-use.redirect="redirect.html"
>
<head data-sly-call="${head.head @ page = page, pwa = pwa}"></head>

<body class="${page.cssClassNames}">
<sly
        data-sly-test.isRedirectPage="${page.redirectTarget && (wcmmode.edit || wcmmode.preview)}"
        data-sly-call="${redirect.redirect @ redirectTarget = page.redirectTarget}"
></sly>
<sly data-sly-test="${!isRedirectPage}">
  <sly data-sly-include="body.socialmedia_begin.html"></sly>
  <sly data-sly-include="body.html"></sly>
  <sly data-sly-call="${footer.footer @ page = page, pwa = pwa}"></sly>
  <sly data-sly-include="body.socialmedia_end.html"></sly>
</sly>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-NXNCD5X"
        height="0" width="0"
        style="display:none;visibility:hidden"></iframe></noscript>
<noscript><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-W8X3JKR"
        height="0" width="0"
        style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->


<!-- Start Custom Scripts(start) -->
<sly data-sly-test.runScripts="${!pageModel.shouldNotRunScripts}">
  ${pageModel.startBodyScripts @ context='unsafe'}
</sly>
${properties.startPageBodyScripts @ context='unsafe'}
<!-- Start Custom Scripts(end) -->
</body>
</html>
